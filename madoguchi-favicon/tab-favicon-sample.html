<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>窓口システム favicon サンプル</title>
    <link id="favicon" rel="icon" href="./madoguchi-minimal-arch-blue-32.png" sizes="32x32" type="image/png">
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }

      .option {
        display: grid;
        grid-template-columns: 44px 1fr;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
      }

      .option img {
        width: 32px;
        height: 32px;
        image-rendering: auto;
      }

      .option strong {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      button {
        border: 1px solid #94a3b8;
        border-radius: 6px;
        background: #f8fafc;
        color: #111827;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 6px 10px;
      }

      button:hover,
      button[aria-pressed="true"] {
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>窓口システム favicon</h1>
      <p>候補を選ぶと、このページのブラウザタブに表示する favicon が切り替わります。</p>

      <section class="grid" aria-label="favicon candidates">
        <article class="option">
          <img src="./madoguchi-minimal-arch-blue-32.png" alt="">
          <div>
            <strong>最小アーチ窓 ブルー</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-blue-32.png" aria-pressed="true">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-green-32.png" alt="">
          <div>
            <strong>最小アーチ窓 グリーン</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-green-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-teal-32.png" alt="">
          <div>
            <strong>最小アーチ窓 濃いティール</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-teal-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-beige-32.png" alt="">
          <div>
            <strong>最小アーチ窓 ベージュ</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-beige-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-orange-32.png" alt="">
          <div>
            <strong>最小アーチ窓 オレンジ</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-orange-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-red-32.png" alt="">
          <div>
            <strong>最小アーチ窓 レッド</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-red-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-indigo-32.png" alt="">
          <div>
            <strong>最小アーチ窓 インディゴ</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-indigo-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-minimal-arch-slate-32.png" alt="">
          <div>
            <strong>最小アーチ窓 スレート</strong>
            <button type="button" data-favicon="./madoguchi-minimal-arch-slate-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-blue-32.png" alt="">
          <div>
            <strong>アーチ窓 ブルー</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-blue-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-green-32.png" alt="">
          <div>
            <strong>アーチ窓 グリーン</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-green-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-teal-32.png" alt="">
          <div>
            <strong>アーチ窓 濃いティール</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-teal-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-beige-32.png" alt="">
          <div>
            <strong>アーチ窓 ベージュ</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-beige-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-orange-32.png" alt="">
          <div>
            <strong>アーチ窓 オレンジ</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-orange-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-red-32.png" alt="">
          <div>
            <strong>アーチ窓 レッド</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-red-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-indigo-32.png" alt="">
          <div>
            <strong>アーチ窓 インディゴ</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-indigo-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-arch-window-slate-32.png" alt="">
          <div>
            <strong>アーチ窓 スレート</strong>
            <button type="button" data-favicon="./madoguchi-arch-window-slate-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-e1-window-32.png" alt="">
          <div>
            <strong>E-1 窓口</strong>
            <button type="button" data-favicon="./madoguchi-e1-window-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-b-ticket-32.png" alt="">
          <div>
            <strong>B チケット</strong>
            <button type="button" data-favicon="./madoguchi-b-ticket-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
        <article class="option">
          <img src="./madoguchi-d-chat-check-32.png" alt="">
          <div>
            <strong>D 相談チェック</strong>
            <button type="button" data-favicon="./madoguchi-d-chat-check-32.png" aria-pressed="false">タブに設定</button>
          </div>
        </article>
      </section>
    </main>
    <script>
      const favicon = document.querySelector("#favicon");
      const buttons = Array.from(document.querySelectorAll("[data-favicon]"));

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          favicon.href = button.dataset.favicon;
          buttons.forEach((item) => {
            item.setAttribute("aria-pressed", String(item === button));
          });
        });
      });
    </script>
  </body>
</html>

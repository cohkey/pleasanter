<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Madoguchi favicon preview</title>
    <link rel="icon" href="./madoguchi-favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 32px;
        background: #f8fafc;
        color: #172033;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .preview-row {
        display: flex;
        align-items: center;
        gap: 20px;
        min-height: 76px;
        border-top: 1px solid #d8dee8;
      }

      .preview-row:last-child {
        border-bottom: 1px solid #d8dee8;
      }

      .sample {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        flex: 0 0 72px;
      }

      .label {
        font-size: 14px;
        color: #4b5563;
      }

      .tab-strip {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 28px;
        padding: 10px;
        border: 1px solid #d8dee8;
        background: #ffffff;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 220px;
        padding: 8px 10px;
        border: 1px solid #d8dee8;
        background: #f8fafc;
        font-size: 13px;
        color: #172033;
      }

      .tab img {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Madoguchi favicon preview</h1>

      <section class="preview-row">
        <div class="sample"><img src="./madoguchi-favicon.svg" alt="" width="16" height="16"></div>
        <div class="label">16 x 16 browser tab size</div>
      </section>
      <section class="preview-row">
        <div class="sample"><img src="./madoguchi-favicon.svg" alt="" width="32" height="32"></div>
        <div class="label">32 x 32 favicon PNG target</div>
      </section>
      <section class="preview-row">
        <div class="sample"><img src="./madoguchi-favicon.svg" alt="" width="64" height="64"></div>
        <div class="label">64 x 64 source icon</div>
      </section>

      <div class="tab-strip" aria-label="Browser tab mock">
        <div class="tab">
          <img src="./madoguchi-favicon.svg" alt="">
          <span>Madoguchi System</span>
        </div>
      </div>
    </main>
  </body>
</html>
